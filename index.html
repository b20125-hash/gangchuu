<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(y,)이 사이트 강추~ (과목별 강사추천^!^)</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --background-color: #f9f9fb;
            --card-color: #ffffff;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: var(--card-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* 과목 선택 그리드 */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .subject-btn {
            background: #f1f2f6;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .subject-btn.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        button.action-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 15px;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        /* 프로그레스 바 */
        .progress-container {
            width: 100%;
            background-color: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 12px;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-align: right;
        }

        /* 질문 및 답변 */
        .question-text {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 35px;
            word-break: keep-all;
            white-space: pre-line;
        }

        .answer-btn {
            background: #f1f2f6;
            color: var(--text-color);
            border: 2px solid transparent;
            text-align: left;
            padding: 18px;
            font-size: 14px;
            width: 100%;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .answer-btn:hover {
            border-color: var(--primary-color);
            background: #f8f9ff;
        }

        /* 결과 화면 레이아웃 균형 */
        .result-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 20px;
            background: #fdfdfd;
            border: 1px solid #edf2f7;
            padding: 15px;
            border-radius: 16px;
        }
        .left-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
            flex-shrink: 0;
        }
        .right-col { flex: 1; }
        
        .badge {
            background: #e1b12c;
            color: white;
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            vertical-align: middle;
        }
        .list-style { padding-left: 20px; line-height: 1.6; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h2 style="font-size: 20px; word-break: keep-all;">Who is your bias? I'm your bias!<br>당신에게 맞는 고결한 스승님 찾기</h2>

        </div>

        <p style="font-weight: bold; margin: 15px 0 5px 0; color: var(--primary-color);">탐구하고자 하시는 학문의 영역을 명하옵소서:</p>
        <div class="subject-grid">
            <button class="subject-btn" onclick="selectSubject('국어', this)">국어</button>
            <button class="subject-btn" onclick="selectSubject('영어', this)">영어</button>
            <button class="subject-btn" onclick="selectSubject('수학', this)">수학</button>
            <button class="subject-btn" onclick="selectSubject('물리', this)">물리</button>
            <button class="subject-btn" onclick="selectSubject('화학', this)">화학</button>
            <button class="subject-btn" onclick="selectSubject('생명', this)">생명</button>
            <button class="subject-btn" onclick="selectSubject('지구', this)">지구</button>
            <button class="subject-btn" onclick="selectSubject('윤사', this)">윤사</button>
            <button class="subject-btn" onclick="selectSubject('사문', this)">사문</button>
        </div>

        <button id="start-btn" class="action-btn" onclick="startQuiz()" style="background: #a4b0be; cursor: not-allowed;" disabled>과목을 먼저 골라주옵소서</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-text" id="progress-percent">0%</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="question-text" id="question-space">질문 공간</div>
        <button class="answer-btn" id="ans1" onclick="selectAnswer('A')">답변 1</button>
        <button class="answer-btn" id="ans2" onclick="selectAnswer('B')">답변 2</button>
    </div>

    <div id="result-screen" class="screen">
        <h2>귀하의 성향을 예리하게 분석한 결과,<br>지식을 윤택하게 해줄 최적의 스승입니다.</h2>
        
        <div class="result-layout">
            <div class="left-col">
                <img id="lecturer-img" src="" alt="강사 프로필 사진" style="width: 110px; height: 130px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd;">
                <a id="lecturer-link" href="#" target="_blank" style="margin-top: 10px; font-size: 12px; color: var(--primary-color); font-weight: bold; text-decoration: underline; text-align: center; word-break: keep-all;">선생님 홈 바로가기</a>
            </div>
            <div class="right-col">
                <div style="font-size: 15px; font-weight: bold; color: #555;">🎯 매칭 정밀도</div>
                <div id="match-accuracy" style="font-size: 28px; font-weight: 900; color: #d63031; margin-bottom: 8px;">0%</div>
                
                <h3 style="margin: 0; font-size: 17px; line-height: 1.4;">

                    <br><span class="badge" id="lecturer-company">소속패스</span>
                </h3>
            </div>
        </div>

        <div style="text-align: left; background: #fafafa; padding: 15px; border-radius: 14px;">
            <p style="margin: 5px 0;"><strong>💡 매칭 이유:</strong> <br><span id="match-reason" style="font-size: 14px; color: #555;">이유</span></p>
            <p style="margin: 15px 0 5px 0;"><strong>📚 핵심 수업 특징:</strong></p>
            <ul class="list-style" id="lecturer-features"></ul>
            <hr style="border: 0; border-top: 1px dashed #ddd; margin: 15px 0;">
            <p style="margin: 5px 0; font-size: 14px;"><strong>👑 추천 예비 라인업:</strong> <span id="rank-list" style="color:#666;">2, 3순위</span></p>

        </div>
        
        <button class="action-btn" onclick="location.reload()">스승님 다시 찾아보기</button>
    </div>
</div>

    let selectedSubject = "";
    let currentIdx = 0;
    let scores = { A: 0, B: 0 };

    // 과목 선택 함수
    function selectSubject(subject, btn) {
        selectedSubject = subject;
        document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        
        let startBtn = document.getElementById('start-btn');
        startBtn.disabled = false;
        startBtn.style.background = "var(--primary-color)";
        startBtn.style.cursor = "pointer";
        startBtn.innerText = "선택하신 [" + subject + "] 강사 추천 진단 시작하기";
    }

    // 퀴즈 시작 함수
    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    // 질문 로드 함수
    function showQuestion() {
        if(currentIdx >= questions.length) {
            showResult();
            return;
        }
        
        // 상단 바 및 퍼센트 수식 계산
        let percent = Math.round((currentIdx / questions.length) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-percent').innerText = percent + '%';

        // 질문 공간 세팅
        let qObj = questions[currentIdx];
        document.getElementById('question-space').innerText = qObj.q;
        document.getElementById('ans1').innerText = qObj.a[0];
        document.getElementById('ans2').innerText = qObj.a[1];
    }

    // 답변 선택 및 점수 합산
    function selectAnswer(type) {
        if(type === 'A') scores.A++;
        else scores.B++;

        currentIdx++;
        showQuestion();
    }

    // 결과 화면 노출 함수
    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');

        // 사용자가 더 많이 선택한 유형(A or B) 도출
        let finalStyle = (scores.A >= scores.B) ? "A" : "B";
        let data = resultsData[selectedSubject][finalStyle];

        // 정밀도(%) 동적 산출식: 기본 신뢰도 80% + 일치 성향에 따른 가중치 + 무작위 미세 편차
        let maxScore = Math.max(scores.A, scores.B);
        let dynamicAccuracy = 78 + (maxScore * 1.8) + Math.floor(Math.random() * 4);
        if(dynamicAccuracy > 100) dynamicAccuracy = 100;

        // 동적 데이터 매핑 바인딩
        document.getElementById('match-accuracy').innerText = dynamicAccuracy + "%";
        document.getElementById('lecturer-name').innerText = data.lecturer;
        document.getElementById('lecturer-company').innerText = data.company;
        document.getElementById('lecturer-img').src = data.img;
        document.getElementById('lecturer-link').href = data.url;
        document.getElementById('match-reason').innerText = data.reason;
        document.getElementById('rank-list').innerText = data.rank;
        document.getElementById('avoid-lecturer').innerText = data.avoid;

        // 개조식 특징 동적 렌더링
        let featuresUl = document.getElementById('lecturer-features');
        featuresUl.innerHTML = "";
        data.features.forEach(f => {
            let li = document.createElement('li');
            li.innerText = f;
            featuresUl.appendChild(li);
        });
    }
